server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
        - id: employee-service
          uri: lb://employee-service
          predicates:
            - Path=/api/v1/employees/**

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
