version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: hrms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hrms_db
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - hrms-network
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:alpine
    container_name: hrms-redis
    ports:
      - "6379:6379"
    networks:
      - hrms-network

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: hrms-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - hrms-network

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: hrms-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - hrms-network

  zipkin:
    image: openzipkin/zipkin
    container_name: hrms-zipkin
    ports:
      - "9411:9411"
    networks:
      - hrms-network

  discovery-server:
    build: ./discovery-server
    container_name: hrms-discovery-server
    ports:
      - "8761:8761"
    networks:
      - hrms-network

  config-server:
    build: ./config-server
    container_name: hrms-config-server
    ports:
      - "8888:8888"
    depends_on:
      - discovery-server
    networks:
      - hrms-network

  api-gateway:
    build: ./api-gateway
    container_name: hrms-api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - discovery-server
      - config-server
    networks:
      - hrms-network

  auth-service:
    build: ./auth-service
    container_name: hrms-auth-service
    ports:
      - "8081:8081"
    depends_on:
      - mysql
      - discovery-server
      - config-server
    networks:
      - hrms-network

  employee-service:
    build: ./employee-service
    container_name: hrms-employee-service
    ports:
      - "8082:8082"
    depends_on:
      - mysql
      - discovery-server
      - config-server
    networks:
      - hrms-network

volumes:
  mysql-data:

networks:
  hrms-network:
    driver: bridge
